version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: career-toolkit-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-career_toolkit}
      MYSQL_USER: ${MYSQL_USER:-career_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-career_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    # Optional: expose MySQL to your host. If 3306 is taken on Windows, set MYSQL_HOST_PORT=3307 (etc).
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_schema.sql:/docker-entrypoint-initdb.d/01_db_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: career-toolkit-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      # Container-to-container MySQL port is always 3306.
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-career_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-career_pass}
      MYSQL_DB: ${MYSQL_DB:-career_toolkit}

volumes:
  mysql_data:

